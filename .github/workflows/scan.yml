name: Scan Stocks

on:
  schedule:
    # 05:00 UTC = 10:30 AM IST (NSE market open)
    - cron: '0 5 * * 1-5'
    # 10:30 UTC = 4:00 PM IST (NSE market close)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan via Railway API
        run: |
          curl -s -X POST https://cci20-sma20-api-production.up.railway.app/scan \
            -H "Content-Type: application/json" \
            --fail \
            -w "\nHTTP status: %{http_code}\n"

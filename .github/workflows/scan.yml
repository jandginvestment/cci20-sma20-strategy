name: Scan Stocks

on:
  schedule:
    # 05:00 UTC = 10:30 AM IST (NSE market open)
    - cron: '0 5 * * 1-5'
    # 10:30 UTC = 4:00 PM IST (NSE market close)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scanner
        env:
          CB_CONN_STR: ${{ secrets.CB_CONN_STR }}
          CB_USERNAME: ${{ secrets.CB_USERNAME }}
          CB_PASSWORD: ${{ secrets.CB_PASSWORD }}
        run: python backend/scanner.py --watchlists backend/watchlists

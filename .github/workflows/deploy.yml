name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      # Don't redeploy when only scan results changed (scan.yml uses [skip ci])
      - 'frontend/src/assets/data/**'
  workflow_dispatch:   # allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular app (production)
        run: npx ng build --configuration production --base-href "/cci20-sma20-strategy/"
        working-directory: frontend

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist/frontend/browser
          publish_branch: gh-pages
          force_orphan: true
